version: '3.8'

services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: hospital-queue-backend
    ports:
      - "8000:8000"
    environment:
      - DATABASE_URL=sqlite:///./hospital_queue.db
    volumes:
      - ./qr_codes:/app/qr_codes
    networks:
      - hospital-network
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        - VITE_API_URL=http://145.241.108.122:8000
    container_name: hospital-queue-frontend
    ports:
      - "80:80"
    depends_on:
      - backend
    networks:
      - hospital-network
    restart: unless-stopped

networks:
  hospital-network:
    driver: bridge